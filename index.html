<body>
  <div class="cp-page" id="cpPage">

    <!-- TopStrip -->
    <div class="topstrip">
      <div class="topstrip-left">
        <span class="star" aria-hidden="true"></span>
        <span class="topstrip-date" id="topstripDate">—</span>
      </div>
      <nav class="topnav" aria-label="Huvudnavigation">
        <a href="#" class="active" id="navToday">Idag</a>
        <a href="#" id="navCounter">Räknare</a>
        <a href="#" id="navSqueeze">Klämdagar</a>
        <a href="#" id="navArchive">Arkiv</a>
      </nav>
    </div>

    <div class="cp-inner">
      <!-- Masthead -->
      <header class="masthead">
        <h1 class="wordmark">Cal<span class="mid-dot">·</span>Pal</h1>
        <div class="edition">
          <div class="edition-meta" id="editionMeta">NUMMER CXLVII · VÅR</div>
          <div class="edition-tagline">Den svenska kalendern,&nbsp;med själ</div>
        </div>
      </header>

      <!-- TodayStats -->
      <div class="today-stats" id="todayStats"></div>

      <!-- Main grid -->
      <div class="cp-grid">
        <main>
          <div class="cal-header">
            <div class="cal-header-left">
              <div class="eyebrow muted">Månaden</div>
              <h2 class="month-name" id="monthName">—</h2>
            </div>
            <div class="cal-header-right">
              <div class="month-nav" id="monthNav">
                <button class="month-nav-btn" id="prevMonth" aria-label="Föregående månad">‹</button>
                <span id="monthNavLabel">← / →</span>
                <button class="month-nav-btn" id="nextMonth" aria-label="Nästa månad">›</button>
              </div>
              <div class="season-poem" id="seasonPoem"></div>
            </div>
          </div>

          <div class="cal-grid" id="calendarGrid" role="grid"></div>

          <div class="month-essay" id="monthEssay"></div>
        </main>

        <aside class="sidebar" id="sidebar"></aside>
      </div>

      <!-- Footer -->
      <footer class="cp-footer">
        <div class="footer-left">
          <span class="star" aria-hidden="true"></span>
          <span>Cal·Pal &nbsp;·&nbsp; Stockholm &nbsp;·&nbsp; MMXXVI &nbsp;·&nbsp; <a href="#" id="navAbout">Om</a></span>
        </div>
        <span class="footer-aphorism">"Hwarken hast eller hvila — endast tid."</span>
      </footer>
    </div>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalBody">
      <button class="modal-close" id="modalClose" aria-label="Stäng dialog">×</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=23"></script>
