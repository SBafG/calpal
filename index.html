<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="CalPal — en svensk kalender med själ. Namnsdagar, helgdagar, månfaser, historia, säsong, kuriosa och mer." />
  <meta name="theme-color" content="#0f172a" />
  <title>CalPal — den svenska kalendern med själ</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23271c14'/%3E%3Cpath d='M 44 18 a 14 14 0 1 0 0 28' fill='none' stroke='%23d4a342' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='34' cy='32' r='3.6' fill='%23d4a342'/%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <rect class="lg-bg" width="40" height="40" rx="11"/>
          <circle class="lg-ring" cx="20" cy="20" r="14.5"/>
          <path class="lg-c" d="M 27 12.5 a 9.5 9.5 0 1 0 0 15"/>
          <circle class="lg-dot" cx="22.8" cy="20" r="2.3"/>
        </svg>
      </span>
      <h1>Cal<span class="ampersand">·</span>Pal</h1>
      <span class="tagline">Den svenska kalendern med själ</span>
    </div>
    <nav class="topnav">
      <button class="navbtn" id="todayBtn" title="Hoppa till idag">Idag</button>
      <button class="navbtn" id="counterBtn" title="Personliga räknare">Räknare</button>
      <button class="navbtn" id="squeezeBtn" title="Klämdags-radar">Klämdagar</button>
      <button class="navbtn" id="aboutBtn" title="Om CalPal">Om</button>
      <div class="theme-toggle" role="group" aria-label="Färgtema">
        <button class="th-btn" data-theme-set="blue" title="Himmel-tema">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
          Himmel
        </button>
        <button class="th-btn" data-theme-set="warm" title="Almanacka-tema">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Almanacka
        </button>
      </div>
      <a class="ext-link" href="https://ekeron.com/" target="_blank" rel="noopener" title="Räkna på bilens leasingkostnad">
        Leasingkalkylator
        <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>
      </a>
    </nav>
  </header>

  <main class="layout">
    <section class="calendar-pane" aria-label="Kalender">
      <div class="calendar-head">
        <button class="navarrow" id="prevMonth" aria-label="Föregående månad">‹</button>
        <h2 id="monthLabel">—</h2>
        <button class="navarrow" id="nextMonth" aria-label="Nästa månad">›</button>
      </div>

      <div class="calendar-grid" id="calendarGrid" role="grid"></div>

      <div class="month-citation" id="monthCitation"></div>
    </section>

    <aside class="sidebar" aria-label="Detaljer för vald dag">
      <div id="dayHero"></div>
      <div id="daylightBarometer"></div>
      <div id="seasonWheel"></div>
      <div id="dayDetail"></div>
    </aside>
  </main>

  <div class="modal" id="modal" hidden>
    <div class="modal-card">
      <button class="modal-close" id="modalClose" aria-label="Stäng">×</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <aside class="ekeron-banner" aria-label="Reklam för Ekeron leasingkalkylator">
    <div class="eb-inner">
      <div class="eb-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/>
          <circle cx="6.5" cy="16.5" r="2.5"/>
          <circle cx="16.5" cy="16.5" r="2.5"/>
        </svg>
      </div>
      <div class="eb-text">
        <strong>Behöver du räkna på leasing?</strong>
        <span>Testa Ekerons leasingkalkylator — jämför bilar, kostnader och förmånsvärde.</span>
      </div>
      <a class="eb-cta" href="https://ekeron.com/" target="_blank" rel="noopener">
        Öppna ekeron.com
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
    </div>
  </aside>

  <footer class="footer">
    <span>CalPal — byggd i Sverige · <a href="https://github.com/SBafG/calpal" target="_blank" rel="noopener">GitHub</a> · ett projekt av <a href="https://ekeron.com/" target="_blank" rel="noopener">Ekeron</a></span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
