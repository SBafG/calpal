<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<title>Cal·Pal — tre designriktningar</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  #root { width: 100%; height: 100vh; }
  .artboard-frame { width: 100%; height: 100%; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script src="shared-data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="v1-almanackan.jsx"></script>
<script type="text/babel" src="v2-naturkalendern.jsx"></script>
<script type="text/babel" src="v3-skandinavisk.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

const App = () => {
  const data = window.CalPal;
  return (
    <DesignCanvas
      title="Cal·Pal"
      subtitle="Tre designriktningar för den svenska kalendern med själ"
    >
      <DCSection
        id="directions"
        title="Tre riktningar"
        subtitle="Samma innehåll · olika temperament. Klicka en artboard för helbild."
      >
        <DCArtboard id="almanackan" label="1 · Almanackan 1855" width={1480} height={1700}>
          <div className="artboard-frame">
            <Almanackan data={data} />
          </div>
        </DCArtboard>

        <DCArtboard id="natur" label="2 · Naturkalendern" width={1480} height={1700}>
          <div className="artboard-frame">
            <Naturkalendern data={data} />
          </div>
        </DCArtboard>

        <DCArtboard id="modern" label="3 · Skandinavisk modernism" width={1480} height={1700}>
          <div className="artboard-frame">
            <SkandinaviskModern data={data} />
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
