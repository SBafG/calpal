name: Update NASA APOD

on:
  schedule:
    # 05:30 UTC dagligen (NASA publicerar runt 00:00 EST)
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch NASA APOD
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: node scripts/fetch-nasa-apod.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nasa-apod.json
          if git diff --staged --quiet; then
            echo "Ingen ändring av NASA-data."
          else
            git commit -m "Update NASA APOD ($(date -u +%Y-%m-%d))"
            git push
          fi
